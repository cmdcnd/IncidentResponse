name: Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docsbuild-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('zensical.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Zensical
        run: |
          python -m pip install -U pip
          pip install zensical

      - name: Build Zensical site
        env:
          GOOGLE_ANALYTICS_KEY: ${{ secrets.GOOGLE_ANALYTICS_KEY }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          path = Path("zensical.toml")
          analytics_key = os.environ.get("GOOGLE_ANALYTICS_KEY", "")
          path.write_text(
              path.read_text().replace("__GOOGLE_ANALYTICS_KEY__", analytics_key)
          )
          PY
          zensical build --clean 2> build-warnings.txt || true

      - name: Upload build warnings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-warnings
          path: build-warnings.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        id: deployment
