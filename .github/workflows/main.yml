name: zensical-docs-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  # required to push to gh-pages

concurrency:
  group: docsbuild-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------------
      # CHECKOUT
      # ----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Zensical docs builds keep full history available

      # ----------------------------------------------------------------------
      # PYTHON SETUP
      # ----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('zensical.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ----------------------------------------------------------------------
      # INSTALL DEPENDENCIES
      # ----------------------------------------------------------------------
      - name: Install Zensical
        run: |
          python -m pip install -U pip
          pip install zensical

      # ----------------------------------------------------------------------
      # BUILD
      # ----------------------------------------------------------------------
      - name: Build Zensical site
        env:
          GOOGLE_ANALYTICS_KEY: ${{ secrets.GOOGLE_ANALYTICS_KEY }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          path = Path("zensical.toml")
          analytics_key = os.environ.get("GOOGLE_ANALYTICS_KEY", "")
          path.write_text(
              path.read_text().replace("__GOOGLE_ANALYTICS_KEY__", analytics_key)
          )
          PY
          zensical build 2> build-warnings.txt || true

      # Optional: Capture any warnings (broken links, etc.)
      - name: Upload build warnings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-warnings
          path: build-warnings.txt

      # ----------------------------------------------------------------------
      # DEPLOY
      # ----------------------------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
